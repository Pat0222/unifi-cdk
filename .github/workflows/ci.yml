name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Type check & synth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: CDK synth
        env:
          CDK_DEFAULT_ACCOUNT: '123456789012'
          CDK_DEFAULT_REGION: us-east-1
        run: |
          npx cdk synth \
            --context eipAllocationId=eipalloc-00000000000000000 \
            --context hostedZoneId=ZXXXXXXXXXXXXXXX \
            --context existingInstanceId=i-00000000000000000 \
            --context instanceType=t3.small \
            --context region=us-east-1 \
            --context domain=example.com \
            --context adminEmail=ci@example.com \
            --context vpcId=vpc-00000000 \
            --context eipPublicIp=1.2.3.4 \
            --quiet

  deploy:
    name: Deploy
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy
        run: |
          get() { aws ssm get-parameter --name "/unifi-cdk/$1" --query 'Parameter.Value' --output text; }
          npx cdk deploy --require-approval never \
            --context eipAllocationId=$(get eipAllocationId) \
            --context hostedZoneId=$(get hostedZoneId) \
            --context existingInstanceId=$(get existingInstanceId) \
            --context instanceType=$(get instanceType) \
            --context region=$(get region) \
            --context domain=$(get domain) \
            --context adminEmail=$(get adminEmail) \
            --context vpcId=$(get vpcId) \
            --context eipPublicIp=$(get eipPublicIp)
